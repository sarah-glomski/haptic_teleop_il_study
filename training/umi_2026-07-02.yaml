# umi conda environment — exact known-good config captured 2026-07-02.
# Training env for haptic_teleop_il_study (UMI diffusion policy).
#
# Recreate on a fresh machine:
#     conda env create -f umi_2026-07-02.yaml     # creates env named 'umi'
#     conda activate umi
# (env already exists? use:  conda env create -f umi_2026-07-02.yaml -n umi_new)
#
# Notes:
#   - torch/torchvision are the cu128 (CUDA 12.8) builds REQUIRED by the
#     RTX 5070 (Blackwell, sm_120). The --extra-index-url below fetches them;
#     without it pip cannot resolve torch==2.7.1+cu128. Needs NVIDIA driver >=570.
#   - Keep Python 3.9 — torch >=2.8 drops 3.9 wheels.
#   - huggingface_hub is pinned 0.12.1 for diffusers 0.11.1 (HfFolder/cached_download).
#   - wandb included for training logging (set logging.mode / log_with=wandb).

