# UMI-migration training config. Copied from the real UMI repo's
# diffusion_policy/config/train_diffusion_unet_timm_kinova_teleop_workspace.yaml
# (charm-lab/HapticTeleopIL). Policy/model hyperparameters left as-is — they're
# already nearly identical to our Aiden-pipeline configs.
#
# Launch (umi conda env, from training/):
#   python train_umi.py --config-name=train_diffusion_unet_timm_kinova_umi \
#       task.dataset_path=../data_collection/demo_data/Collection5/kinova_teleop_umi.zarr.zip
#
# train_umi.py points sys.path at the REAL UMI repo and config_path at
# config/umi/, so `defaults: - task: kinova_teleop` below resolves to the
# sibling config/umi/task/kinova_teleop.yaml (UMI schema) — NOT our existing
# config/task/kinova_teleop.yaml (Aiden pipeline, untouched).
#
# Batch: 8 x gradient_accumulate_every 8 = effective 64 — the recipe validated
# on the Aiden-pipeline bs64 run (lr 3e-4 / warmup 2000 are paired with it).

defaults:
  - _self_
  - task: kinova_teleop

name: train_diffusion_unet_timm_kinova_umi   # was: train_diffusion_unet_timm — distinct name so
                                              # output dirs never collide with Aiden-pipeline runs
_target_: diffusion_policy.workspace.train_diffusion_unet_image_workspace.TrainDiffusionUnetImageWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "umi_v1"

n_action_steps: 8

policy:
  _target_: diffusion_policy.policy.diffusion_unet_timm_policy.DiffusionUnetTimmPolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.DDIMScheduler
    num_train_timesteps: 50
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon

  obs_encoder:
    _target_: diffusion_policy.model.vision.timm_obs_encoder.TimmObsEncoder
    shape_meta: ${shape_meta}

    model_name: 'vit_base_patch16_clip_224.openai'
    pretrained: True
    frozen: False

    global_pool: ''
    feature_aggregation: 'attention_pool_2d'
    position_encording: 'sinusoidal'
    downsample_ratio: 32

    transforms:
      - type: RandomCrop
        ratio: 0.95
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08

    use_group_norm: True
    share_rgb_model: False
    imagenet_norm: True   # NOTE: confirmed dead/unused param in this encoder version — no effect either way

  num_inference_steps: 16
  obs_as_global_cond: True
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True
  input_pertub: 0.1
  train_diffusion_n_samples: 1

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# effective batch = batch_size (8) * training.gradient_accumulate_every (8) = 64
# (RTX 5070 12GB cannot fit a literal batch of 64 — see the Aiden-pipeline
# bs64 config for the same reasoning)
dataloader:
  batch_size: 8
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 8
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 2000
  num_epochs: 121   # 121 (not 120) so the last epoch (120) is a multiple of
                    # checkpoint_every (30) -> a checkpoint lands on the final epoch.
                    # 0-indexed loop runs 0..120; with 120 the last ckpt was epoch 90.
  gradient_accumulate_every: 8   # x batch_size 8 = effective batch 64
  use_ema: True
  freeze_encoder: False
  rollout_every: 999999   # was: 10 — env_runner is RealPushTImageRunner, a complete
                          # stub (no hardware), so this made no functional difference,
                          # but 999999 matches our safety convention (see lab notes §10)
                          # in case a real Kinova runner is ever wired in later
  checkpoint_every: 30    # was: 30 — match our Aiden-pipeline cadence
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: 'Haptic Teleop IL Study - UMI migration'  # was: umi — kept distinct from our
                                                        # existing 'Haptic Teleop IL Study'
                                                        # wandb project so runs don't mix
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 20
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
