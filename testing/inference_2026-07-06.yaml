# inference conda env — captured 2026-07-06 (Python 3.12, ROS2 Jazzy + policy).
# Runs testing/inference.py: diffusion policy rollout on the Kinova Gen3.
# Built by cloning `launch` (ROS2 + Kinova, py3.12) and adding the policy stack.
# Python 3.12 REQUIRED (ROS2 rclpy). Source /opt/ros/jazzy/setup.bash AND the full
# workspace /home/piezense/ros2_ws/install/setup.bash (for piezense_interfaces).
#
# Recreate:  conda env create -f inference_2026-07-06.yaml && conda activate inference
#
# HARD-WON version pins (do not bump blindly):
#   - torch 2.12.1+cu130 (PyPI): supports RTX 5070 sm_120; loads torch-2.7 ckpts.
#   - protobuf 3.20.3: kortex_api needs <=3.20 (its generated code breaks on 4+).
#   - NO wandb, NO accelerate: those need protobuf>=4 / huggingface_hub>=0.21 which
#     conflict with kortex (protobuf) and diffusers 0.11.1 (hub). They are TRAINING-
#     only, so train_diffusion_unet_image_workspace.py now guards their imports in
#     try/except -> inference loads without them. (Training still uses the umi env.)
#   - huggingface_hub 0.12.1: diffusers 0.11.1 imports HfFolder/cached_download.
#   - numpy <2 (1.26.x): ROS Jazzy cv_bridge is built for numpy 1.x. opencv-python
#     held at 4.10.0.84 to match. hydra-core 1.3.2 (1.2.0 breaks on py>=3.11).
#   - Extra deps pip-installed (invisible to conda from system apt): lark, scipy,
#     einops, pandas. kortex_api itself is a Kinova wheel in ~/.local (not captured).

